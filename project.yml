## XcodeGen spec for the PiSky iOS app.
## On a Mac:  brew install xcodegen && xcodegen generate && open PiSky.xcodeproj
## Hand-writing a .pbxproj from Windows is error-prone, so the project is described
## here declaratively and generated on the Mac where the build/sign happens.

name: PiSky
options:
  bundleIdPrefix: com.pisky
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: "1,2"          # iPhone (1) + iPad (2) — Tab S4 parity
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: ""                    # ← set your Apple Developer Team ID on the Mac
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: minimal       # bump to `complete` once the actors are audited

targets:
  PiSky:
    type: application
    platform: iOS
    sources:
      - path: PiSky
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pisky.mobile     # mirrors the Android release applicationId
        INFOPLIST_FILE: PiSky/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: Brass
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
    # The 11 Pro Max is a phone, but the original UI is a tablet/landscape instrument
    # panel — universal + all orientations keeps the PFD and scope usable in landscape.

# Shared scheme so headless CI (`xcodebuild -scheme PiSky`) has something to build.
schemes:
  PiSky:
    build:
      targets:
        PiSky: all
    run:
      config: Debug
    archive:
      config: Release
